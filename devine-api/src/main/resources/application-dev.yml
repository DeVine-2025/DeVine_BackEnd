# ===========================================
# Development Profile
# ===========================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate

# Logging
logging:
  level:
    root: INFO
    com.umc.devine: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.web: DEBUG

# Thread Pool Configuration
executor:
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
