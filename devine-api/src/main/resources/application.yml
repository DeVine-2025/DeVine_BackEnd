spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "classpath:core-defaults.yml"
  profiles:
    active: ${SPRING_PROFILE_ACTIVE:dev}
  application:
    name: DeVine-API

  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_POOL_SIZE:15}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD:2000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:240000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:120000}
      minimum-idle: ${HIKARI_MIN_IDLE:3}

  flyway:
    enabled: true

  # AWS S3
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
      s3:
        bucket: ${AWS_S3_BUCKET:}
      region:
        static: ap-northeast-2
      cloudfront:
        domain: ${AWS_CLOUDFRONT_DOMAIN:}

# Server
server:
  port: ${API_PORT:8080}

# Clerk
clerk:
  secret-key: ${CLERK_SECRET_KEY:}

# GitHub
github:
  service-token: ${GITHUB_SERVICE_TOKEN:}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

