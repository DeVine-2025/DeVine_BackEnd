# ===========================================
# Production Profile (Realtime)
# ===========================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Logging
logging:
  level:
    root: INFO
    com.umc.devine: INFO
    org.hibernate.SQL: ERROR
    org.springframework.web: WARN

# Thread Pool Configuration (prod)
executor:
  sse-connection:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 50
  sse-dispatch:
    core-pool-size: 20
    max-pool-size: 100
    queue-capacity: 500
