# ===========================================
# Development Profile
# ===========================================

server:
  port: ${SPRING_PORT:8080}

spring:
  jpa:
    hibernate:
      ddl-auto: update

# Logging - 개발 환경 상세 로깅
logging:
  level:
    root: INFO
    com.umc.devine: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.web: DEBUG
    org.hibernate.orm.jdbc.bind: trace

# SSE Configuration
sse:
  timeout: 3600000 # 60분
  heartbeat-rate: 30000 # 30초
  executor:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 25
