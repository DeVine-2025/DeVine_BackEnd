spring:
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILE_ACTIVE:dev}
  application:
    name: DeVine

  # OAuth2 (Clerk JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI:}

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:}:${POSTGRES_PORT:}/${POSTGRES_DATABASE:}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_POOL_SIZE:25}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD:2000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:240000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:120000}
      minimum-idle: ${HIKARI_MIN_IDLE:3}

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000ms}

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  # JPA
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # AWS S3
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
      s3:
        bucket: ${AWS_S3_BUCKET:}
      region:
        static: ap-northeast-2
      cloudfront:
        domain: ${AWS_CLOUDFRONT_DOMAIN:}

# Server
server:
  port: ${SPRING_PORT:8080}

# Clerk
clerk:
  secret-key: ${CLERK_SECRET_KEY:}

# GitHub
github:
  service-token: ${GITHUB_SERVICE_TOKEN:}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# SSE Configuration
sse:
  timeout: 3600000
  heartbeat-rate: 30000

# Redis Channel
redis:
  channel:
    notification-prefix: "notification:user:"
    notification-pattern: "notification:user:*"
