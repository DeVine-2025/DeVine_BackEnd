spring:
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: dev
  application:
    name: DeVine

  # OAuth2 (Clerk JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI:}

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:}:${POSTGRES_PORT:}/${POSTGRES_DATABASE:}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_POOL_SIZE:25}
      # n ms(n초) 이상 커넥션을 점유하면 누수로 판단하고 경고 로그를 찍음
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD:2000}
      # 커넥션 최대 수명을 4분~5분(네트워크 타임아웃 350초보다 짧게)으로 설정
      max-lifetime: ${HIKARI_MAX_LIFETIME:240000}
      # 유휴 커넥션이 풀에 남아있을 수 있는 최대 시간 (max-lifetime보다 작아야 함)
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:120000}
      # 풀에 유지할 최소 유휴 커넥션 수
      minimum-idle: ${HIKARI_MIN_IDLE:3}

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000ms}

  # JPA
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # AWS S3
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
      s3:
        bucket: ${AWS_S3_BUCKET:}
      region:
        static: ap-northeast-2
      cloudfront:
        domain: ${AWS_CLOUDFRONT_DOMAIN:}

# Clerk
clerk:
  secret-key: ${CLERK_SECRET_KEY:}

# GitHub
github:
  service-token: ${GITHUB_SERVICE_TOKEN:}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Redis Channel
redis:
  channel:
    notification-prefix: "notification:user:"
    notification-pattern: "notification:user:*"
