# ===========================================
# Production Profile
# ===========================================

server:
  port: ${SPRING_PORT}

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Logging - 운영 환경 최소 로깅
logging:
  level:
    root: INFO
    com.umc.devine: INFO
    org.hibernate.SQL: ERROR
    org.springframework.web: WARN

# SSE Configuration
sse:
  timeout: 3600000 # 60분
  heartbeat-rate: 30000 # 30초

# Thread Pool Configuration (ExecutorConfig에서 사용)
executor:
  # @Async 메서드 실행용
  async:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 200
  # SSE 연결 유지용 (Spring MVC Async)
  sse-connection:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 50
  # SSE 메시지 전송용 (Redis -> Client)
  sse-dispatch:
    core-pool-size: 20
    max-pool-size: 100
    queue-capacity: 500

# fastapi
fastapi:
  report:
    base-url: ${FASTAPI_URL:}
    connect-timeout: ${FASTAPI_CONNECT_TIMEOUT:}
    read-timeout: ${FASTAPI_READ_TIMEOUT:}