# ===========================================
# Test Profile
# ===========================================

server:
  port: 8081

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "https://test-issuer.local"

# Logging
logging:
  level:
    root: INFO
    com.umc.devine: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

clerk:
  secret-key: "test-secret-key-for-integration-tests"

# Thread Pool Configuration
executor:
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
  sse-connection:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 25
  sse-dispatch:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 50
